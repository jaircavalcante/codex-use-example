name: Build and Open Pull Request

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

  open-pull-request:
    name: Open pull request
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref_name != 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if gh pr view "$BRANCH_NAME" --repo "$REPOSITORY" --json number >/dev/null 2>&1; then
            echo "Pull request already exists for branch $BRANCH_NAME."
            exit 0
          fi

          gh pr create \
            --repo "$REPOSITORY" \
            --base main \
            --head "$BRANCH_NAME" \
            --title "Automated PR: $BRANCH_NAME" \
            --body "Pull request aberto automaticamente apos build e testes com sucesso."
